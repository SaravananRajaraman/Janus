<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Janus</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:        #0f1117;
    --bg2:       #1a1d27;
    --bg3:       #22253a;
    --border:    #2e3147;
    --accent:    #6c8ef5;
    --accent2:   #4ade80;
    --warn:      #f59e0b;
    --danger:    #f87171;
    --text:      #e2e8f0;
    --muted:     #6b7280;
    --card-bg:   #1e2130;
    --font:      'Inter', system-ui, sans-serif;
    --radius:    10px;
  }

  html, body { height: 100%; background: var(--bg); color: var(--text); font-family: var(--font); font-size: 14px; }

  /* ── Header ── */
  header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 14px 24px; border-bottom: 1px solid var(--border);
    background: var(--bg2); position: sticky; top: 0; z-index: 10;
  }
  .logo { font-size: 20px; font-weight: 700; letter-spacing: -0.5px; color: var(--accent); }
  .tagline { font-size: 12px; color: var(--muted); margin-left: 10px; }
  .stats-bar { display: flex; gap: 16px; }
  .stat { display: flex; flex-direction: column; align-items: center; }
  .stat .n { font-size: 20px; font-weight: 700; line-height: 1; }
  .stat .l { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: .5px; }
  .stat.pending .n { color: var(--warn); }
  .stat.moved   .n { color: var(--accent2); }
  .stat.dupes   .n { color: var(--accent); }
  .stat.rej     .n { color: var(--danger); }

  /* ── Nav ── */
  nav {
    display: flex; gap: 4px; padding: 12px 24px;
    background: var(--bg2); border-bottom: 1px solid var(--border);
  }
  .tab-btn {
    padding: 7px 18px; border: none; border-radius: 6px; cursor: pointer;
    font-size: 13px; font-weight: 500; background: transparent; color: var(--muted);
    transition: background .15s, color .15s;
  }
  .tab-btn.active { background: var(--bg3); color: var(--text); }
  .tab-btn:hover:not(.active) { color: var(--text); }

  /* ── Main ── */
  main { padding: 24px; max-width: 960px; margin: 0 auto; }
  .tab { display: none; }
  .tab.active { display: block; }

  /* ── Cards ── */
  .queue-grid { display: grid; gap: 16px; }
  .card {
    background: var(--card-bg); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 18px; position: relative;
  }
  .card-head { display: flex; align-items: baseline; gap: 10px; margin-bottom: 12px; }
  .card-filename { font-size: 15px; font-weight: 600; color: var(--text); word-break: break-all; }
  .badge {
    font-size: 10px; font-weight: 600; padding: 2px 8px; border-radius: 20px;
    background: var(--bg3); color: var(--muted); white-space: nowrap;
  }
  .badge.conf-hi { background: #0d2e1a; color: var(--accent2); }
  .badge.conf-mid { background: #2d260a; color: var(--warn); }
  .badge.conf-lo { background: #2d1111; color: var(--danger); }

  .proposal-row { display: flex; align-items: center; gap: 10px; margin-bottom: 6px; }
  .arrow { color: var(--muted); font-size: 16px; flex-shrink: 0; }
  .rename-val { color: var(--accent); font-weight: 500; font-family: monospace; font-size: 13px; }
  .dest-val   { color: var(--muted); font-size: 12px; font-family: monospace; }
  .summary    { color: var(--muted); font-size: 13px; margin: 8px 0 6px; line-height: 1.5; }
  .intent-tag { font-size: 11px; color: var(--muted); }

  .card-actions { display: flex; gap: 8px; margin-top: 14px; flex-wrap: wrap; }
  .btn {
    padding: 7px 16px; border-radius: 6px; border: none; cursor: pointer;
    font-size: 13px; font-weight: 500; transition: opacity .15s;
  }
  .btn:hover { opacity: .85; }
  .btn:disabled { opacity: .4; cursor: not-allowed; }
  .btn-approve { background: var(--accent2); color: #0a1a0a; }
  .btn-edit    { background: var(--bg3); color: var(--text); border: 1px solid var(--border); }
  .btn-reject  { background: var(--danger); color: #1a0a0a; }
  .btn-undo    { background: var(--bg3); color: var(--muted); border: 1px solid var(--border); font-size: 12px; }

  /* ── Edit form ── */
  .edit-form { margin-top: 14px; padding-top: 14px; border-top: 1px solid var(--border); display: none; }
  .edit-form.open { display: block; }
  .edit-form label { display: block; font-size: 11px; color: var(--muted); margin-bottom: 4px; margin-top: 10px; text-transform: uppercase; letter-spacing: .4px; }
  .edit-form input {
    width: 100%; padding: 8px 10px; border-radius: 6px; border: 1px solid var(--border);
    background: var(--bg3); color: var(--text); font-family: monospace; font-size: 13px;
  }
  .edit-form input:focus { outline: 2px solid var(--accent); border-color: transparent; }
  .edit-form-actions { display: flex; gap: 8px; margin-top: 12px; }

  /* ── Activity ── */
  .activity-list { display: grid; gap: 10px; }
  .activity-item {
    background: var(--card-bg); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 12px 16px;
    display: flex; align-items: center; gap: 14px;
  }
  .activity-icon { font-size: 18px; flex-shrink: 0; }
  .activity-info { flex: 1; min-width: 0; }
  .activity-filename { font-weight: 600; font-size: 13px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .activity-detail  { font-size: 12px; color: var(--muted); margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .activity-time    { font-size: 11px; color: var(--muted); flex-shrink: 0; }
  .status-pill {
    font-size: 10px; font-weight: 700; padding: 2px 8px; border-radius: 20px;
    text-transform: uppercase; letter-spacing: .4px; flex-shrink: 0;
  }
  .pill-approved  { background: #0d2e1a; color: var(--accent2); }
  .pill-rejected  { background: #2d1111; color: var(--danger); }
  .pill-duplicate { background: #0d1e3a; color: var(--accent); }
  .pill-pending   { background: #2d260a; color: var(--warn); }
  .pill-undone    { background: #2a1f36; color: #c084fc; }

  /* ── Rules ── */
  .rules-table { width: 100%; border-collapse: collapse; margin-bottom: 16px; }
  .rules-table th { text-align: left; padding: 8px 12px; font-size: 11px; text-transform: uppercase; letter-spacing: .4px; color: var(--muted); border-bottom: 1px solid var(--border); }
  .rules-table td { padding: 8px 12px; border-bottom: 1px solid var(--border); }
  .rules-table input {
    width: 100%; background: var(--bg3); border: 1px solid transparent;
    border-radius: 4px; padding: 5px 8px; color: var(--text); font-family: monospace; font-size: 13px;
  }
  .rules-table input:focus { outline: 2px solid var(--accent); }
  .rules-table td:first-child { font-weight: 500; color: var(--accent); width: 140px; }
  .btn-save { background: var(--accent); color: #0a0d1a; }
  .save-msg  { display: inline-block; margin-left: 12px; font-size: 12px; color: var(--accent2); opacity: 0; transition: opacity .3s; }
  .save-msg.show { opacity: 1; }

  /* ── Stale card ── */
  .card-stale { border-color: #3d2a0a; }
  .stale-banner {
    background: #2d1e08; border: 1px solid #5c3d10; border-radius: 6px;
    padding: 8px 12px; font-size: 12px; color: var(--warn);
    margin-bottom: 12px; line-height: 1.4;
  }

  /* ── Empty state ── */
  .empty { text-align: center; padding: 60px 20px; color: var(--muted); }
  .empty .icon { font-size: 48px; margin-bottom: 12px; }
  .empty p { font-size: 15px; }

  /* ── Live indicator ── */
  .live-dot {
    display: inline-block; width: 8px; height: 8px; border-radius: 50%;
    background: var(--accent2); margin-right: 6px;
    animation: pulse 2s ease-in-out infinite;
  }
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: .3; } }
  .live-label { font-size: 11px; color: var(--muted); display: flex; align-items: center; }
</style>
</head>
<body>

<header>
  <div style="display:flex;align-items:baseline;gap:6px">
    <span class="logo">Janus</span>
    <span class="tagline" id="tagline">loading…</span>
  </div>
  <div class="stats-bar">
    <div class="stat pending"><div class="n" id="s-pending">—</div><div class="l">Pending</div></div>
    <div class="stat moved"><div class="n"  id="s-moved">—</div><div class="l">Moved today</div></div>
    <div class="stat dupes"><div class="n"  id="s-dupes">—</div><div class="l">Duplicates</div></div>
    <div class="stat rej"><div class="n"    id="s-rej">—</div><div class="l">Rejected</div></div>
  </div>
</header>

<nav>
  <button class="tab-btn active" onclick="showTab('queue')">Queue <span id="q-badge"></span></button>
  <button class="tab-btn" onclick="showTab('activity')">Activity</button>
  <button class="tab-btn" onclick="showTab('rules')">Rules</button>
</nav>

<main>
  <!-- Queue tab -->
  <section class="tab active" id="tab-queue">
    <div class="queue-grid" id="queue-list"></div>
  </section>

  <!-- Activity tab -->
  <section class="tab" id="tab-activity">
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:16px">
      <div class="live-label"><span class="live-dot"></span>Live feed</div>
    </div>
    <div class="activity-list" id="activity-list"></div>
  </section>

  <!-- Rules tab -->
  <section class="tab" id="tab-rules">
    <p style="color:var(--muted);margin-bottom:16px;font-size:13px">
      Edit category destinations below. Changes are written to <code>rules.yaml</code>.
      Restart Janus to apply any watch-path changes.
    </p>
    <table class="rules-table" id="rules-table">
      <thead><tr><th>Category</th><th>Destination</th></tr></thead>
      <tbody></tbody>
    </table>
    <button class="btn btn-save" onclick="saveRules()">Save rules</button>
    <span class="save-msg" id="save-msg">✓ Saved</span>
  </section>
</main>

<script>
/* ================================================================
   Janus Dashboard — vanilla JS, no build tool needed
   ================================================================ */

let _rulesCache = null;

// ── Tab switching ────────────────────────────────────────────────
function showTab(id) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('tab-' + id).classList.add('active');
  event.target.classList.add('active');
  if (id === 'activity') loadActivity();
  if (id === 'rules')    loadRules();
}

// ── API helpers ──────────────────────────────────────────────────
async function api(method, path, body) {
  const opts = { method, headers: {} };
  if (body) { opts.body = JSON.stringify(body); opts.headers['Content-Type'] = 'application/json'; }
  const r = await fetch(path, opts);
  if (!r.ok) { const t = await r.text(); throw new Error(t); }
  return r.json();
}

// ── Stats ────────────────────────────────────────────────────────
async function loadStats() {
  try {
    const s = await api('GET', '/api/stats');
    document.getElementById('s-pending').textContent = s.pending;
    document.getElementById('s-moved').textContent   = s.moved_today;
    document.getElementById('s-dupes').textContent   = s.duplicates;
    document.getElementById('s-rej').textContent     = s.rejections;
    const n = s.pending;
    document.getElementById('tagline').textContent =
      n === 0 ? 'All clear — the threshold is quiet.' :
      n === 1 ? '1 file waiting at the door.' :
                `${n} files waiting at the door.`;
  } catch(e) { console.error('stats:', e); }
}

// ── Queue ────────────────────────────────────────────────────────
async function loadQueue() {
  const el = document.getElementById('queue-list');
  try {
    const items = await api('GET', '/api/queue');
    document.getElementById('q-badge').textContent = items.length ? `(${items.length})` : '';
    if (!items.length) {
      el.innerHTML = `<div class="empty"><div class="icon">🚪</div><p>No files waiting — the threshold is clear.</p></div>`;
      return;
    }
    el.innerHTML = items.map(renderCard).join('');
  } catch(e) {
    el.innerHTML = `<div class="empty"><p>Could not load queue: ${e.message}</p></div>`;
  }
}

function confClass(c) {
  if (c >= 0.8) return 'conf-hi';
  if (c >= 0.5) return 'conf-mid';
  return 'conf-lo';
}

function renderCard(item) {
  const p    = item.proposal || {};
  const tid  = item.thread_id;
  const conf = p.confidence != null ? p.confidence : 0;
  const pct  = Math.round(conf * 100);
  // A card with no proposal data is a stale entry from a pre-Phase-4 run
  const isStale = !item.proposal;
  return `
<div class="card${isStale ? ' card-stale' : ''}" id="card-${tid}">
  ${isStale ? `<div class="stale-banner">⚠ Stale entry — no checkpoint found. Dismiss to clear, or restart Janus and let it redetect the file.</div>` : ''}
  <div class="card-head">
    <span class="card-filename">${esc(item.filename)}</span>
    <span class="badge ${confClass(conf)}">${pct}% confidence</span>
    <span class="badge">${esc(p.category || 'Other')}</span>
    ${p.intent ? `<span class="badge">${esc(p.intent)}</span>` : ''}
  </div>
  <div class="proposal-row">
    <span class="arrow">→</span>
    <span class="rename-val">${esc(p.rename_to || item.filename)}</span>
  </div>
  <div class="proposal-row">
    <span class="arrow">📁</span>
    <span class="dest-val">${esc(p.destination || '')}</span>
  </div>
  ${p.summary ? `<div class="summary">${esc(p.summary)}</div>` : ''}
  <div class="card-actions">
    ${isStale
      ? `<button class="btn btn-reject" onclick="doDismiss('${tid}')">✕ Dismiss stale entry</button>`
      : `<button class="btn btn-approve" onclick="doApprove('${tid}')">✓ Approve</button>
         <button class="btn btn-edit" onclick="toggleEdit('${tid}')">✎ Edit</button>
         <button class="btn btn-reject" onclick="doReject('${tid}')">✗ Reject</button>`
    }
  </div>
  <div class="edit-form" id="edit-${tid}">
    <label>Rename to</label>
    <input type="text" id="ren-${tid}" value="${esc(p.rename_to || item.filename)}">
    <label>Destination folder</label>
    <input type="text" id="dst-${tid}" value="${esc(p.destination || '')}">
    <div class="edit-form-actions">
      <button class="btn btn-approve" onclick="doApproveEdit('${tid}')">✓ Approve with edits</button>
      <button class="btn btn-edit" onclick="toggleEdit('${tid}')">Cancel</button>
    </div>
  </div>
</div>`;
}

function toggleEdit(tid) {
  const f = document.getElementById('edit-' + tid);
  f.classList.toggle('open');
}

async function doApprove(tid) {
  disable(tid);
  try {
    await api('POST', `/api/approve/${tid}`, {});
    removeCard(tid); loadStats();
  } catch(e) {
    let msg = e.message;
    try { msg = JSON.parse(msg).detail || msg; } catch(_) {}
    alert('Approve failed: ' + msg);
    enable(tid);
  }
}

async function doApproveEdit(tid) {
  disable(tid);
  const rename_to   = document.getElementById('ren-' + tid).value.trim();
  const destination = document.getElementById('dst-' + tid).value.trim();
  try {
    await api('POST', `/api/approve/${tid}`, { rename_to, destination });
    removeCard(tid); loadStats();
  } catch(e) { alert('Approve failed: ' + e.message); enable(tid); }
}

async function doReject(tid) {
  if (!confirm('Reject this file? It will stay in place.')) return;
  disable(tid);
  try {
    await api('POST', `/api/reject/${tid}`, {});
    removeCard(tid); loadStats();
  } catch(e) {
    // 409 = no checkpoint (stale or still processing)
    if (e.message && e.message.includes('"status":409') || e.message.includes('409')) {
      alert('Cannot reject: ' + JSON.parse(e.message).detail);
    } else {
      alert('Reject failed: ' + e.message);
    }
    enable(tid);
  }
}

async function doDismiss(tid) {
  if (!confirm('Remove this stale entry from the queue? The file itself will not be touched.')) return;
  disable(tid);
  try {
    await api('POST', `/api/dismiss/${tid}`, {});
    removeCard(tid); loadStats();
  } catch(e) { alert('Dismiss failed: ' + e.message); enable(tid); }
}

function removeCard(tid) {
  const c = document.getElementById('card-' + tid);
  if (c) { c.style.opacity = '0'; c.style.transition = 'opacity .3s'; setTimeout(() => { c.remove(); loadQueue(); }, 300); }
}
function disable(tid) {
  document.querySelectorAll(`#card-${tid} .btn`).forEach(b => b.disabled = true);
}
function enable(tid) {
  document.querySelectorAll(`#card-${tid} .btn`).forEach(b => b.disabled = false);
}

// ── Activity ─────────────────────────────────────────────────────
async function loadActivity() {
  const el = document.getElementById('activity-list');
  try {
    const rows = await api('GET', '/api/activity?limit=60');
    if (!rows.length) {
      el.innerHTML = `<div class="empty"><div class="icon">📭</div><p>No activity yet.</p></div>`;
      return;
    }
    el.innerHTML = rows.map(renderActivity).join('');
  } catch(e) { el.innerHTML = `<p style="color:var(--danger)">Error: ${e.message}</p>`; }
}

const STATUS_ICON = { approved:'✅', rejected:'🚫', duplicate:'🔁', pending:'⏳', undone:'↩️' };
const STATUS_PILL = { approved:'pill-approved', rejected:'pill-rejected', duplicate:'pill-duplicate', pending:'pill-pending', undone:'pill-undone' };

function renderActivity(row) {
  const icon   = STATUS_ICON[row.status] || '📄';
  const pill   = STATUS_PILL[row.status] || '';
  const ts     = row.created_at ? new Date(row.created_at).toLocaleString() : '';
  const detail = row.moved_to || row.path || '';
  const canUndo = row.status === 'approved';
  return `
<div class="activity-item" id="act-${row.thread_id}">
  <span class="activity-icon">${icon}</span>
  <div class="activity-info">
    <div class="activity-filename">${esc(row.filename)}</div>
    <div class="activity-detail">${esc(detail)}</div>
  </div>
  <span class="status-pill ${pill}">${row.status}</span>
  <span class="activity-time">${ts}</span>
  ${canUndo ? `<button class="btn btn-undo" onclick="doUndo('${row.thread_id}')">↩ Undo</button>` : ''}
</div>`;
}

async function doUndo(tid) {
  if (!confirm('Move the file back to its original location?')) return;
  try {
    await api('POST', `/api/undo/${tid}`, {});
    loadActivity(); loadStats();
  } catch(e) { alert('Undo failed: ' + e.message); }
}

// ── Rules ────────────────────────────────────────────────────────
async function loadRules() {
  try {
    const rules = await api('GET', '/api/rules');
    _rulesCache = rules;
    const tbody = document.querySelector('#rules-table tbody');
    tbody.innerHTML = Object.entries(rules.categories || {}).map(([cat, cfg]) => `
<tr>
  <td>${esc(cat)}</td>
  <td><input type="text" data-cat="${esc(cat)}" value="${esc(cfg.destination || '')}"></td>
</tr>`).join('');
  } catch(e) { alert('Could not load rules: ' + e.message); }
}

async function saveRules() {
  if (!_rulesCache) return;
  const cats = { ..._rulesCache.categories };
  document.querySelectorAll('#rules-table input').forEach(inp => {
    const cat = inp.dataset.cat;
    if (cats[cat]) cats[cat] = { ...cats[cat], destination: inp.value.trim() };
  });
  try {
    await api('POST', '/api/rules', { categories: cats });
    const msg = document.getElementById('save-msg');
    msg.classList.add('show');
    setTimeout(() => msg.classList.remove('show'), 2500);
  } catch(e) { alert('Save failed: ' + e.message); }
}

// ── SSE — live feed ──────────────────────────────────────────────
function startSSE() {
  const src = new EventSource('/api/feed');
  src.onmessage = (e) => {
    if (!e.data || e.data.trim() === '') return;
    try {
      const ev = JSON.parse(e.data);
      handleLiveEvent(ev);
    } catch(_) {}
  };
  src.onerror = () => setTimeout(startSSE, 5000);
}

function handleLiveEvent(ev) {
  loadStats();
  // If the approved/rejected/duplicate card is still in the queue, remove it
  if (['approved','rejected','duplicate'].includes(ev.type)) {
    const card = document.getElementById('card-' + ev.thread_id);
    if (card) { card.remove(); loadQueue(); }
  }
  // Prepend to activity list if that tab is showing
  if (document.getElementById('tab-activity').classList.contains('active')) {
    loadActivity();
  }
}

// ── Utilities ────────────────────────────────────────────────────
function esc(s) {
  return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── Bootstrap ────────────────────────────────────────────────────
(function init() {
  loadStats();
  loadQueue();
  startSSE();
  setInterval(() => {
    loadStats();
    if (document.getElementById('tab-queue').classList.contains('active')) loadQueue();
  }, 10000);
})();
</script>
</body>
</html>
